<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIT COLLAB HUB - Login</title>

    <!-- Import Google Font: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c5/Vellore_Institute_of_Technology_seal_2017.svg/1200px-Vellore_Institute_of_Technology_seal_2017.svg.png"
            alt="VIT Logo" class="logo-img"
            style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: white; padding: 2px;">
        <div class="header-text">
            <span class="header-title">VIT</span>
            <span class="header-subtitle">(Vellore Campus)</span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <div class="login-card">

            <!-- TOP SECTION -->
            <div class="card-header">
                <div class="brand-container">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c5/Vellore_Institute_of_Technology_seal_2017.svg/1200px-Vellore_Institute_of_Technology_seal_2017.svg.png"
                        alt="VIT Logo" class="brand-logo"
                        style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: white; padding: 2px;">
                    <div class="brand-box">
                        <span class="brand-vit">VIT</span> <span class="brand-collab">Collab Hub</span>
                    </div>
                </div>
                <h2 class="sign-in-text">Sign in to your account</h2>
            </div>

            <form id="login-form">

                <!-- MIDDLE SECTION -->
                <div class="form-middle">

                    <!-- LOGIN TABS -->
                    <div class="login-tabs">
                        <button type="button" class="tab-btn active" data-role="student">Student</button>
                        <button type="button" class="tab-btn" data-role="club">Club</button>
                        <button type="button" class="tab-btn" data-role="admin">Admin</button>
                    </div>

                    <!-- Identifier Input (Username/Email) -->
                    <div class="input-group">
                        <input type="text" id="username" class="input-field" placeholder="Registration No." required>
                        <!-- Inline SVG User Icon -->
                        <svg class="input-icon user-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                    </div>

                    <!-- Password Input -->
                    <div class="input-group">
                        <input type="password" id="password" class="input-field" placeholder="Password" required>
                        <!-- Inline SVG Eye Icon -->
                        <svg id="toggle-password" class="input-icon eye-icon" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path id="eye-path"
                                d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                        </svg>
                    </div>

                    <div class="submit-container">
                        <button type="submit" id="sign-in-btn" class="btn btn-primary">Sign In</button>
                    </div>

                    <!-- Feedback Messages -->
                    <div id="auth-message" class="message-box"></div>
                </div>

                <!-- BOTTOM SECTION -->
                <div class="form-bottom">
                    <div class="links-container">
                        <div class="auth-links">
                            <a href="#" id="forgot-password">Forgot Password</a>
                            <a href="#">Forgot LoginId</a>
                        </div>
                        <a href="#" class="home-link">Go to Home Page</a>
                    </div>
                </div>

            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        Copyright &copy; 2026 Software Development Cell, VIT COLLAB HUB, Vellore-632 014.
    </footer>

    <!-- Firebase Logic -->
    <script type="module" src="../js/login.js"></script>
</body>

</html>
